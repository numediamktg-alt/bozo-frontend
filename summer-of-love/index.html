<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>40th Anniversary of the Summer of Love</title>
<meta name="description" content="A photographic document of the 40th Anniversary of the Summer of Love, 2007. Photographs by Chuck Jones.">
<meta property="og:title" content="40th Anniversary of the Summer of Love">
<meta property="og:description" content="100 photographs by Chuck Jones. Leaf Aptus 75S and Leica M8.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<!-- lightGallery core + plugin CSS (bundle includes all plugin styles) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/css/lightgallery-bundle.min.css">

<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* ── Title card ── */
#title-card {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 1;
  transition: opacity 1.8s ease;
}

#title-card.fade-out {
  opacity: 0;
  pointer-events: none;
}

#title-card h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-size: clamp(1.6rem, 4vw, 3.2rem);
  color: #d4d0c8;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.5;
  padding: 0 2rem;
}

#title-card .subtitle {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-style: italic;
  font-size: clamp(0.9rem, 1.8vw, 1.3rem);
  color: #8a8478;
  margin-top: 1.5rem;
  letter-spacing: 0.08em;
}

#title-card .enter {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 400;
  font-size: clamp(1.2rem, 2vw, 1.6rem);
  color: #d4d0c8;
  margin-top: 3.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: color 0.4s ease, border-color 0.4s ease;
  border: 1px solid rgba(200, 195, 185, 0.3);
  padding: 0.8rem 2.5rem;
  border-radius: 2px;
}

#title-card .enter:hover {
  color: #fff;
  border-color: rgba(255, 255, 255, 0.5);
}

/* ── Inline gallery container ── */
#inline-gallery {
  width: 100%;
  height: 100%;
}

/* ── Copyright watermark ── */
#copyright {
  position: fixed;
  bottom: 0.8rem;
  left: 1.5rem;
  z-index: 2147483647;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 300;
  font-size: 0.75rem;
  color: rgba(120, 115, 105, 0.25);
  letter-spacing: 0.1em;
  pointer-events: none;
  user-select: none;
}

/* ── Like button ── */
#like-wrap {
  position: fixed;
  bottom: 70px;
  right: 20px;
  z-index: 10000;
  display: none;
  text-align: center;
}

#like-btn {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  width: 44px;
  height: 44px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s ease, transform 0.2s ease;
}

#like-btn:hover {
  background: rgba(0,0,0,0.6);
  transform: scale(1.1);
}

#like-btn svg {
  width: 22px;
  height: 22px;
  fill: none;
  stroke: rgba(255, 255, 255, 0.6);
  stroke-width: 1.5;
  transition: fill 0.3s ease, stroke 0.3s ease;
}

#like-btn.liked svg {
  fill: rgba(220, 60, 60, 0.9);
  stroke: rgba(220, 60, 60, 1);
}

#like-count {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.5);
  margin-top: 0.25rem;
}

#like-btn.liked ~ #like-count {
  color: rgba(220, 60, 60, 0.7);
}

@keyframes heart-pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

#like-btn.pop {
  animation: heart-pop 0.35s ease;
}

/* ── Loading ── */
#loading {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: opacity 1s ease;
}

#loading.hidden {
  opacity: 0;
  pointer-events: none;
}

#loading .spinner {
  width: 2px;
  height: 24px;
  background: #5a5650;
  animation: load-pulse 1.2s ease-in-out infinite;
}

@keyframes load-pulse {
  0%, 100% { opacity: 0.2; transform: scaleY(0.5); }
  50% { opacity: 1; transform: scaleY(1); }
}

/* ── lightGallery overrides for dark gallery aesthetic ── */
.lg-backdrop {
  background-color: #000 !important;
}

.lg-progress-bar .lg-progress {
  background-color: rgba(200, 195, 185, 0.4) !important;
}

.lg-outer .lg-thumb-outer {
  background-color: rgba(0,0,0,0.85) !important;
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div id="title-card">
  <h1>40th Anniversary<br>of the<br>Summer of Love</h1>
  <div class="subtitle">September 2, 2007</div>
  <div class="subtitle">Photographs by Chuck Jones</div>
  <div class="enter" id="enter-btn">Enter Gallery</div>
</div>

<div id="inline-gallery"></div>

<div id="copyright">&copy; Chuck Jones</div>

<div id="like-wrap">
  <button id="like-btn" aria-label="Like this image">
    <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
  </button>
  <div id="like-count"></div>
</div>

<!-- lightGallery core + plugins from cdnjs -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/lightgallery.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/autoplay/lg-autoplay.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/fullscreen/lg-fullscreen.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/share/lg-share.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/zoom/lg-zoom.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.8.3/plugins/thumbnail/lg-thumbnail.umd.min.js"></script>

<script>
(function() {
  'use strict';

  var R2_BASE = 'https://pub-a262b95b94f54c69bed5d3ac1e07da4b.r2.dev';
  var LIKES_API = 'https://sol-likes.chuck-3ba.workers.dev';

  // ── State ──
  var manifest = [];
  var galleryInstance = null;
  var currentFilename = '';
  var myLikes = {};
  var likeCounts = {};

  // ── Elements ──
  var $loading = document.getElementById('loading');
  var $titleCard = document.getElementById('title-card');
  var $enterBtn = document.getElementById('enter-btn');
  var $inlineGallery = document.getElementById('inline-gallery');
  var $copyright = document.getElementById('copyright');
  var $likeWrap = document.getElementById('like-wrap');
  var $likeBtn = document.getElementById('like-btn');
  var $likeCount = document.getElementById('like-count');

  // ── Likes system ──
  try { myLikes = JSON.parse(localStorage.getItem('sol-likes') || '{}'); } catch(e) {}

  function saveMyLikes() {
    try { localStorage.setItem('sol-likes', JSON.stringify(myLikes)); } catch(e) {}
  }

  function updateLikeUI() {
    if (!currentFilename) return;
    var isLiked = !!myLikes[currentFilename];
    var count = likeCounts[currentFilename] || 0;
    $likeBtn.classList.toggle('liked', isLiked);
    $likeCount.textContent = count > 0 ? count : '';
  }

  function fetchAllLikes() {
    return fetch(LIKES_API + '/likes')
      .then(function(resp) { return resp.ok ? resp.json() : {}; })
      .then(function(data) { likeCounts = data; })
      .catch(function() {});
  }

  function toggleLike() {
    if (!currentFilename) return;
    var isLiked = !!myLikes[currentFilename];
    var action = isLiked ? 'unlike' : 'like';

    if (isLiked) {
      delete myLikes[currentFilename];
      likeCounts[currentFilename] = Math.max(0, (likeCounts[currentFilename] || 1) - 1);
    } else {
      myLikes[currentFilename] = true;
      likeCounts[currentFilename] = (likeCounts[currentFilename] || 0) + 1;
      $likeBtn.classList.remove('pop');
      void $likeBtn.offsetHeight;
      $likeBtn.classList.add('pop');
    }
    saveMyLikes();
    updateLikeUI();

    fetch(LIKES_API + '/like', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: currentFilename, action: action }),
    })
    .then(function(resp) { return resp.ok ? resp.json() : null; })
    .then(function(data) {
      if (data) {
        likeCounts[currentFilename] = data.count;
        updateLikeUI();
      }
    })
    .catch(function() {});
  }

  $likeBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    toggleLike();
  });

  // ── Image URL helper ──
  function imageURL(filename) {
    return R2_BASE + '/' + encodeURIComponent(filename);
  }

  // ── Build gallery with lightGallery ──
  function buildGallery() {
    var dynamicEl = manifest.map(function(filename) {
      return {
        src: imageURL(filename),
        thumb: imageURL(filename),
        subHtml: '',
      };
    });

    galleryInstance = lightGallery($inlineGallery, {
      container: $inlineGallery,
      dynamic: true,
      dynamicEl: dynamicEl,

      // Plugins
      plugins: [lgAutoplay, lgFullscreen, lgShare, lgZoom, lgThumbnail],

      // Core
      mode: 'lg-fade',
      speed: 1400,
      loop: true,
      counter: true,
      download: false,
      mousewheel: true,
      keyPress: true,
      controls: true,
      closable: false,
      showCloseIcon: false,
      showMaximizeIcon: false,
      preload: 3,
      swipeToClose: false,
      closeOnTap: false,

      // Autoplay
      autoplay: true,
      slideShowAutoplay: true,
      slideShowInterval: 7000,
      progressBar: true,
      forceSlideShowAutoplay: false,

      // Fullscreen
      fullScreen: true,

      // Share
      share: true,
      facebook: true,
      twitter: true,
      pinterest: true,

      // Zoom
      scale: 1,
      zoom: true,
      actualSize: true,

      // Thumbnails
      thumbnail: true,
      showThumbByDefault: false,
      toggleThumb: true,
      thumbWidth: 80,
      thumbHeight: '60px',
      thumbMargin: 5,
    });

    // Track current slide for the like button
    $inlineGallery.addEventListener('lgAfterSlide', function(event) {
      var index = event.detail.index;
      currentFilename = manifest[index] || '';
      updateLikeUI();
    });

    // Set initial filename
    currentFilename = manifest[0] || '';
    updateLikeUI();

    // Open gallery at first slide
    galleryInstance.openGallery(0);

    // Show like button
    $likeWrap.style.display = 'block';
  }

  // ── Initialize ──
  function init() {
    fetch(R2_BASE + '/manifest.json?t=' + Date.now())
      .then(function(resp) {
        if (!resp.ok) throw new Error('No manifest');
        return resp.json();
      })
      .then(function(data) {
        manifest = data.images || data;
        if (manifest.length === 0) return;

        // Load like counts in background
        fetchAllLikes().then(updateLikeUI);

        // Ready
        $loading.classList.add('hidden');
      })
      .catch(function(e) {
        console.error('Could not load manifest:', e);
        $loading.querySelector('.spinner').style.background = '#8a3030';
      });
  }

  // ── Enter gallery ──
  $enterBtn.addEventListener('click', startGallery);

  function startGallery() {
    $titleCard.classList.add('fade-out');
    setTimeout(function() {
      $titleCard.style.display = 'none';
      buildGallery();
    }, 1800);
  }

  // K key for like
  document.addEventListener('keydown', function(e) {
    if (e.key === 'k' || e.key === 'K') {
      toggleLike();
    }
  });

  // Go
  init();

})();
</script>
</body>
</html>
